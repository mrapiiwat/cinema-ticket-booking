version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: cinema_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - cinema_network

  redis:
    image: redis:7-alpine
    container_name: cinema_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    networks:
      - cinema_network

volumes:
  mongo_data:

networks:
  cinema_network:
    driver: bridge